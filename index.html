<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍅 Pomodoro Timer</title>
  <meta name="description" content="A beautiful Pomodoro Timer to boost your focus and productivity." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="app-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🍅</span>
        <span class="logo-text">Pomodoro</span>
      </div>
      <div class="header-actions">
        <button id="themeToggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
          <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Open settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- Main Timer Card -->
    <main class="main-card">
      <!-- Mode Tabs -->
      <div class="mode-tabs" role="tablist" aria-label="Timer modes">
        <button class="tab active" id="tab-pomodoro" data-mode="pomodoro" role="tab" aria-selected="true">Pomodoro</button>
        <button class="tab" id="tab-short" data-mode="short" role="tab" aria-selected="false">Short Break</button>
        <button class="tab" id="tab-long" data-mode="long" role="tab" aria-selected="false">Long Break</button>
      </div>

      <!-- Task Input -->
      <div class="task-row">
        <input type="text" id="taskInput" class="task-input" placeholder="What are you working on?" maxlength="60" aria-label="Current task" />
      </div>

      <!-- Circular Progress Timer -->
      <div class="timer-container" aria-live="polite" aria-label="Timer display">
        <svg class="progress-ring" viewBox="0 0 240 240" aria-hidden="true">
          <circle class="ring-bg" cx="120" cy="120" r="108" />
          <circle class="ring-fill" id="ringFill" cx="120" cy="120" r="108" />
        </svg>
        <div class="timer-display">
          <div class="timer-time" id="timerDisplay">25:00</div>
          <div class="timer-label" id="timerLabel">Focus Time</div>
        </div>
      </div>

      <!-- Session Dots -->
      <div class="session-tracker" aria-label="Session progress">
        <div class="session-dot active" id="dot-1" aria-label="Session 1"></div>
        <div class="session-dot" id="dot-2" aria-label="Session 2"></div>
        <div class="session-dot" id="dot-3" aria-label="Session 3"></div>
        <div class="session-dot" id="dot-4" aria-label="Session 4"></div>
      </div>
      <div class="session-text" id="sessionText">Session 1 of 4</div>

      <!-- Controls -->
      <div class="controls">
        <button class="ctrl-btn secondary" id="resetBtn" title="Reset (R)" aria-label="Reset timer">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
        </button>
        <button class="ctrl-btn primary" id="startBtn" title="Start/Pause (Space)" aria-label="Start timer">
          <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg id="pauseIcon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button class="ctrl-btn secondary" id="skipBtn" title="Skip (S)" aria-label="Skip to next session">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        </button>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-value" id="totalPomodoros">0</span>
          <span class="stat-label">Today</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-value" id="totalFocusTime">0m</span>
          <span class="stat-label">Focus Time</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-value" id="currentStreak">0</span>
          <span class="stat-label">Streak</span>
        </div>
      </div>
    </main>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="modal-card">
        <div class="modal-header">
          <h2 id="settingsTitle">Settings</h2>
          <button class="icon-btn" id="closeSettings" aria-label="Close settings">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="settings-section">
          <h3 class="settings-section-title">⏱ Timer (minutes)</h3>
          <div class="settings-grid">
            <div class="setting-item">
              <label for="settingPomodoro">Pomodoro</label>
              <input type="number" id="settingPomodoro" min="1" max="90" value="25" />
            </div>
            <div class="setting-item">
              <label for="settingShort">Short Break</label>
              <input type="number" id="settingShort" min="1" max="30" value="5" />
            </div>
            <div class="setting-item">
              <label for="settingLong">Long Break</label>
              <input type="number" id="settingLong" min="1" max="60" value="15" />
            </div>
          </div>
        </div>

        <div class="settings-section">
          <h3 class="settings-section-title">🔔 Preferences</h3>
          <div class="toggle-row">
            <span>Auto-start Breaks</span>
            <label class="toggle-switch" aria-label="Auto-start breaks">
              <input type="checkbox" id="autoBreak" />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="toggle-row">
            <span>Auto-start Pomodoros</span>
            <label class="toggle-switch" aria-label="Auto-start pomodoros">
              <input type="checkbox" id="autoPomodoro" />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="toggle-row">
            <span>Sound Alerts</span>
            <label class="toggle-switch" aria-label="Sound alerts">
              <input type="checkbox" id="soundEnabled" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="toggle-row">
            <span>Browser Notifications</span>
            <label class="toggle-switch" aria-label="Browser notifications">
              <input type="checkbox" id="notificationsEnabled" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn-save" id="saveSettings">Save Changes</button>
        </div>
      </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast" role="alert" aria-live="assertive"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
